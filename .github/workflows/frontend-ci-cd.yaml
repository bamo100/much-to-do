name: Frontend CI/CD

on:
  push:
    branches: [master]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci-cd.yaml'
  pull_request:
    branches: [master]
    paths:
      - 'frontend/**'

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  S3_BUCKET: ${{ vars.S3_BUCKET_NAME }}
  # CLOUDFRONT_DIST_ID: ${{ vars.CLOUDFRONT_DIST_ID }}

jobs:
  build-and-test:
    name: Build & Security Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Security Scan (npm audit)
        working-directory: frontend
        # Run audit but don't fail the pipeline if low vulnerabilities are found
        run: npm audit --audit-level=high || true
        
      - name: Build production bundle
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: npm run build
        
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: frontend/dist/
          retention-days: 1

  deploy:
    name: Deploy to S3
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: dist/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Sync build files to S3
        run: |
          aws s3 sync dist/ s3://${{ env.S3_BUCKET }} --delete --cache-control "public, max-age=31536000, immutable" --exclude "index.html"
          aws s3 cp dist/index.html s3://${{ env.S3_BUCKET }}/index.html --cache-control "no-cache, no-store, must-revalidate"

      # NOTE: Since you're using Cloudflare instead of CloudFront, this step is commented out.
      # If you were using CloudFront, you would uncomment this to invalidate the cache.
      # - name: Invalidate CloudFront cache
      #   run: |
      #     aws cloudfront create-invalidation \
      #       --distribution-id ${{ env.CLOUDFRONT_DIST_ID }} \
      #       --paths "/*"

      - name: Notify success
        if: success()
        run: echo "Frontend deployed successfully to S3!"

      - name: Notify failure
        if: failure()
        run: echo "Frontend deployment failed! Check logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
