name: Backend CI/CD

on:
  push:
    branches: [master]
    paths:
      - 'backend/MuchToDo/**'
      - '.github/workflows/backend-ci-cd.yaml'
  pull_request:
    branches: [master]
    paths:
      - 'backend/MuchToDo/**'

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: backend/MuchToDo/go.sum

      - name: Install dependencies
        working-directory: backend/MuchToDo
        run: go mod download

      - name: Run vet
        working-directory: backend/MuchToDo
        run: go vet ./...

      - name: Run tests
        working-directory: backend/MuchToDo
        env:
          INTEGRATION: "true"
          MONGO_URI: mongodb://localhost:27017
          DB_NAME: testdb
          REDIS_ADDR: localhost
          REDIS_PORT: 6379
          JWT_SECRET_KEY: test-secret-key
          JWT_EXPIRATION_HOURS: 72
          ENABLE_CACHE: false
          PORT: 8080
        run: go test ./... -v -timeout 60s

      - name: Vulnerability scan
        working-directory: backend/MuchToDo
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug secrets
        run: |
          echo "Region is set: ${{ vars.AWS_REGION != '' }}"
          echo "Role ARN is set: ${{ vars.AWS_DEPLOY_ROLE_ARN != '' }}"  
          echo "ECR REPO is set: ${{ env.ECR_REPOSITORY }}"
          echo "ASG NAME is set: ${{ vars.ASG_NAME != '' }}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate image tag
        id: meta
        run: |
          IMAGE_TAG=$(echo ${{ github.sha }} | cut -c1-8)
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV

      - name: Build Docker image
        working-directory: backend/MuchToDo
        run: |
          docker build \
            --no-cache \
            -t $ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REPOSITORY:latest \
            .

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          format: table
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true

      - name: Push to ECR
        run: |
          docker push $ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REPOSITORY:latest

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Start instance refresh
        run: |
          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name ${{ vars.ASG_NAME }} \
            --preferences '{"MinHealthyPercentage": 50, "InstanceWarmup": 120}'

      - name: Wait for instance refresh
        run: |
          echo "Waiting for instance refresh to complete..."
          while true; do
            STATUS=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name ${{ vars.ASG_NAME }} \
              --query 'InstanceRefreshes[0].Status' \
              --output text)

            echo "Current status: $STATUS"

            if [ "$STATUS" = "Successful" ]; then
              echo "Instance refresh completed successfully"
              break
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "Instance refresh failed with status: $STATUS"
              exit 1
            fi

            sleep 30
          done

      - name: Smoke test
        run: |
          ALB_DNS=$(aws elbv2 describe-load-balancers \
            --names starttech-alb \
            --query 'LoadBalancers[0].DNSName' \
            --output text)

          echo "Testing health endpoint at $ALB_DNS..."

          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://$ALB_DNS/health)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i failed with status $STATUS, retrying in 15s..."
            sleep 15
          done

          echo "Health check failed after 10 attempts"
          exit 1

      - name: Notify success
        if: success()
        run: |
          echo "Backend deployed successfully"
          echo "Image tag: ${{ needs.build-and-push.outputs.image_tag }}"

      - name: Notify failure
        if: failure()
        run: |
          echo "Backend deployment failed"
          echo "Check logs at: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"