services:
  mongo-keyfile-init:
    image: mongo:8.0
    container_name: mongo-keyfile-init
    volumes:
      - mongo_keyfile:/data/keyfile
    command: >
      bash -c "
        if [ ! -f /data/keyfile/mongodb.key ]; then
          openssl rand -base64 756 > /data/keyfile/mongodb.key
          chmod 400 /data/keyfile/mongodb.key
          chown 999:999 /data/keyfile/mongodb.key
        fi
      "

  mongodb:
    image: mongo:8.0
    container_name: mongodb
    restart: unless-stopped
    depends_on:
      mongo-keyfile-init:
        condition: service_completed_successfully
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-example}
      MONGO_INITDB_DATABASE: ${DB_NAME:-much_todo_db}
    command:
      [
        "--replSet",
        "rs0",
        "--bind_ip_all",
        "--keyFile",
        "/data/keyfile/mongodb.key",
      ]
    volumes:
      - mongo_data:/data/db
      - mongodb_config:/data/configdb
      - mongo_keyfile:/data/keyfile   # ← volume instead of bind mount
    healthcheck:
      test: echo "try { rs.status() } catch (err) { rs.initiate({_id:'rs0',members:[{_id:0,host:'${MONGO_HOST:-mongodb}:27017'}]}) }" | mongosh --port 27017 -u ${MONGO_INITDB_ROOT_USERNAME:-root} -p ${MONGO_INITDB_ROOT_PASSWORD:-example} --authenticationDatabase admin --quiet
      interval: 15s
      timeout: 15s
      retries: 10
      start_period: 60s
    networks:
      - backend
    extra_hosts:
      - "host.docker.internal:host-gateway"

  mongo-express:
    image: mongo-express:1.0.2
    container_name: mongo-express
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_INITDB_ROOT_USERNAME:-root}:${MONGO_INITDB_ROOT_PASSWORD:-example}@mongodb:27017/?authSource=admin&replicaSet=rs0&directConnection=true
      ME_CONFIG_BASICAUTH_USERNAME: ${ME_CONFIG_BASICAUTH_USERNAME:-admin}
      ME_CONFIG_BASICAUTH_PASSWORD: ${ME_CONFIG_BASICAUTH_PASSWORD:-admin123}
    networks:
      - backend

  redis:
    image: redis:7.2
    container_name: redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: redis-commander
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8082:8081"
    environment:
      - REDIS_HOSTS=local:${REDIS_HOST:-redis}:${REDIS_PORT:-6379}
    networks:
      - backend

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: muchtodo-backend
    restart: on-failure
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      - MONGO_URI=mongodb://${MONGO_INITDB_ROOT_USERNAME:-root}:${MONGO_INITDB_ROOT_PASSWORD:-example}@mongodb:27017/${DB_NAME:-much_todo_db}?authSource=admin&replicaSet=rs0&directConnection=true
      - DB_NAME=${DB_NAME:-much_todo_db}
      - PORT=8080
      - REDIS_URL=redis://${REDIS_HOST:-redis}:${REDIS_PORT:-6379}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend

volumes:
  mongo_data:
  mongodb_config:
  mongo_keyfile:    # ← new volume for keyfile
  redis_data:

networks:
  backend:
    driver: bridge