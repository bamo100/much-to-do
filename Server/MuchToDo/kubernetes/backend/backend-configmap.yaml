apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: muchtodo
data:
  PORT: "8080"
  DB_NAME: much_todo_db
  env-file: |
    MONGO_URI=mongodb://root:example@mongodb-service:27017/much_todo_db?authSource=admin
    PORT=8080
    DB_NAME=much_todo_db
    JWT_SECRET_KEY=your-secret-key-here
    JWT_EXPIRATION_HOURS=72
    ENABLE_CACHE=false
    REDIS_ADDR=redis:6379
    REDIS_PASSWORD=
    LOG_LEVEL=info
    LOG_FORMAT=json